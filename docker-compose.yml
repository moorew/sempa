services:
  ts-sempa:
    image: tailscale/tailscale:latest
    container_name: ts-sempa
    hostname: sempa
    env_file:
      - path: .env.local
        required: false
    environment:
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/sempa.json
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./ts-sempa/state:/var/lib/tailscale
      - ./ts-sempa/config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    network_mode: host
    restart: unless-stopped

  # Local AI for text processing (email-subject → task-title cleanup). Opt-in:
  # only started when the "ai" Compose profile is active (install.sh sets
  # COMPOSE_PROFILES=ai in .env when you choose local AI). It runs on the host
  # network namespace — same as ts-sempa/sempa — and binds loopback only, so the
  # sempa container reaches it at http://127.0.0.1:11434 while it stays off the
  # LAN. (sempa uses network_mode: service:ts-sempa = host netns, where a
  # bridge-network hostname like "ollama" would NOT resolve — hence host + loopback.)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["ai"]
    network_mode: host
    environment:
      OLLAMA_HOST: "127.0.0.1:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment if blackbox has an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           capabilities: [gpu]

  sempa:
    build: .
    container_name: sempa
    network_mode: service:ts-sempa
    depends_on:
      - ts-sempa
    environment:
      PORT: "9001"
      DB_PATH: "/data/sempa.db"
      FRONTEND_DIR: "/app/frontend/build"
      APP_URL: "${APP_URL:-https://sempa.clevercode.ts.net}"
      FRONTEND_URL: "${APP_URL:-https://sempa.clevercode.ts.net}"
      ENV: "production"
      # Empty unless local AI was enabled at install (keeps the AI feature off and
      # the settings fields blank otherwise). install.sh writes the loopback URL.
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:1.5b}"
    env_file:
      - path: .env.local
        required: false
    volumes:
      - sempa_data:/data
    restart: unless-stopped

volumes:
  sempa_data:
  ollama_data:
