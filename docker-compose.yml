services:
  sempa:
    build: .
    container_name: sempa
    ports:
      - "${HOST_PORT:-9001}:9001"
      - "2525:2525"
    environment:
      PORT: "9001"
      DB_PATH: "/data/sempa.db"
      FRONTEND_DIR: "/app/frontend/build"
      APP_URL: "${APP_URL:-http://localhost:9001}"
      FRONTEND_URL: "${APP_URL:-http://localhost:9001}"
      ENV: "production"
    env_file:
      - path: .env.local
        required: false
    volumes:
      - sempa_data:/data
    restart: unless-stopped

volumes:
  sempa_data:
