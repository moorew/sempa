services:
  aura:
    build: .
    container_name: aura
    ports:
      - "9001:9001"
    environment:
      PORT: "9001"
      DB_PATH: "/data/aura.db"
      FRONTEND_DIR: "/app/frontend/build"
      APP_URL: "https://blackbox.clevercode.ts.net"
      FRONTEND_URL: "https://blackbox.clevercode.ts.net"
      ENV: "production"
    env_file:
      - path: .env.local
        required: false   # won't fail if file doesn't exist
    volumes:
      - aura_data:/data
    restart: unless-stopped

volumes:
  aura_data:
