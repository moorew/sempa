services:
  ts-sempa:
    image: tailscale/tailscale:latest
    container_name: ts-sempa
    hostname: sempa
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/sempa.json
      - TS_STATE_DIR=/var/lib/tailscale
    env_file:
      - path: .env.local
        required: false
    volumes:
      - ./ts-sempa/state:/var/lib/tailscale
      - ./ts-sempa/config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    network_mode: host
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment if blackbox has an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           capabilities: [gpu]

  sempa:
    build: .
    container_name: sempa
    network_mode: service:ts-sempa
    depends_on:
      - ts-sempa
      - ollama
    environment:
      PORT: "9001"
      DB_PATH: "/data/sempa.db"
      FRONTEND_DIR: "/app/frontend/build"
      APP_URL: "${APP_URL:-https://sempa.clevercode.ts.net}"
      FRONTEND_URL: "${APP_URL:-https://sempa.clevercode.ts.net}"
      ENV: "production"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:1.5b}"
    env_file:
      - path: .env.local
        required: false
    volumes:
      - sempa_data:/data
    restart: unless-stopped

volumes:
  sempa_data:
  ollama_data:
