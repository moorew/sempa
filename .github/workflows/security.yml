name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full sweep — catches newly-disclosed CVEs in unchanged code.
    - cron: '27 6 * * 1'

# Least privilege by default; jobs widen as needed.
# Third-party actions are pinned to commit SHAs (version in trailing comment);
# Dependabot's github-actions updates keep them current.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # SAST — CodeQL covers the Go backend and the SvelteKit/TS frontend.
  # Go uses build-mode "manual" (none is unsupported) since go.mod lives in
  # backend/, not the repo root.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Build Go backend (manual build mode)
        if: matrix.language == 'go'
        working-directory: backend
        run: go build ./...
      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Go dependency vulnerabilities — call-graph aware, so it only flags CVEs
  # your code actually reaches. Very low false-positive rate.
  # ---------------------------------------------------------------------------
  govulncheck:
    name: govulncheck (Go deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        working-directory: backend
        run: govulncheck ./...

  # ---------------------------------------------------------------------------
  # Trivy — one pass for npm/Go CVEs, Dockerfile + compose misconfig, and
  # secrets. SARIF feeds the Security tab (degrades gracefully without GHAS);
  # the second pass fails the build only on fixable HIGH/CRITICAL CVEs.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy (deps · IaC · secrets)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
      - name: Upload SARIF to code scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy
      - name: Fail on fixable HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

  # ---------------------------------------------------------------------------
  # Secret scanning across full history (fetch-depth: 0 = all commits).
  # ---------------------------------------------------------------------------
  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # zizmor — static analysis of the workflows themselves (over-broad
  # permissions, injectable expressions, unpinned actions, etc.).
  # ---------------------------------------------------------------------------
  zizmor:
    name: zizmor (Actions lint)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run zizmor
        continue-on-error: true
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Findings appear in the Security tab; don't fail the build on them yet.
          advanced-security: true
          persona: regular
