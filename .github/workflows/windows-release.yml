name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Windows (x64 + ARM64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: windows-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend web assets
        working-directory: frontend
        run: npm run build

      - name: Clean stale installer bundles
        shell: pwsh
        run: |
          # The cached target dir retains bundles from previous version builds.
          # Remove them so the release upload globs only match the current build.
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue `
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle, `
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle

      - name: Build Tauri app — x64
        working-directory: frontend
        run: npx tauri build --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app — ARM64
        working-directory: frontend
        run: npx tauri build --target aarch64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Sempa_*_x64-setup.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Sempa_*_x64_en-US.msi
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/Sempa_*_arm64-setup.exe

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: sempa-windows-installers
          path: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 14
