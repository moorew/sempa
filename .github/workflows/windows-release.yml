name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Windows (x64 + ARM64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: windows-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend web assets
        working-directory: frontend
        run: npm run build

      - name: Clean stale installer bundles
        shell: pwsh
        run: |
          # The cached target dir retains bundles from previous version builds.
          # Remove them so the release upload globs only match the current build.
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue `
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle, `
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle

      - name: Build Tauri app — x64
        working-directory: frontend
        run: npx tauri build --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app — ARM64
        working-directory: frontend
        run: npx tauri build --target aarch64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Code signing (Azure Trusted Signing) -----------------------------
      # Inert until you opt in. To enable: set repo *variable*
      # WINDOWS_SIGNING_ENABLED=true, add *secrets* AZURE_TENANT_ID /
      # AZURE_CLIENT_ID / AZURE_CLIENT_SECRET (the CI service principal), and add
      # *variables* AZURE_TS_ENDPOINT (e.g. https://eus.codesigning.azure.net/),
      # AZURE_TS_ACCOUNT, AZURE_TS_PROFILE. Until the flag is set these steps are
      # skipped and installers publish unsigned, exactly as before. Signs the
      # downloaded installers (.exe/.msi) — the artifacts SmartScreen flags.
      - name: Sign installers — x64 (Azure Trusted Signing)
        if: ${{ vars.WINDOWS_SIGNING_ENABLED == 'true' }}
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_TS_PROFILE }}
          files-folder: ${{ github.workspace }}/frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true

      - name: Sign installers — ARM64 (Azure Trusted Signing)
        if: ${{ vars.WINDOWS_SIGNING_ENABLED == 'true' }}
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_TS_PROFILE }}
          files-folder: ${{ github.workspace }}/frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Sempa_*_x64-setup.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Sempa_*_x64_en-US.msi
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/Sempa_*_arm64-setup.exe

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sempa-windows-installers
          path: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 14
