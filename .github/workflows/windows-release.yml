name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Windows (x64 + ARM64)
    runs-on: windows-latest

    # Updater signing. These are SAFE no-ops until you add the secrets: Tauri only
    # signs (and only emits the .sig / updater artifacts) when the private key is
    # present AND bundle.createUpdaterArtifacts is enabled. See docs/UPDATER.md to
    # turn on silent auto-update. Until then every step below behaves exactly as
    # before and the release builds unsigned installers as it does today.
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          # No npm cache: this workflow runs only on tags/workflow_dispatch and
          # publishes release artifacts, so restoring a cache is an unnecessary
          # cache-poisoning vector (flagged by zizmor) for little speed gain.

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: windows-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend web assets
        working-directory: frontend
        run: npm run build

      - name: Clean stale installer bundles
        shell: pwsh
        run: |
          # The cached target dir retains bundles from previous version builds.
          # Remove them so the release upload globs only match the current build.
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue `
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle, `
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle

      - name: Build Tauri app — x64
        working-directory: frontend
        run: npx tauri build --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app — ARM64
        working-directory: frontend
        run: npx tauri build --target aarch64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build the Tauri updater manifest (latest.json) from the signed bundles so
      # the desktop app can silently self-update. GUARDED: only runs once the
      # signing key secret exists (until then .sig files aren't produced and this
      # step is skipped entirely — zero effect on today's release). The endpoint
      # consumed by the app is github.com/<repo>/releases/latest/download/latest.json.
      # See docs/UPDATER.md.
      - name: Generate updater manifest (latest.json)
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.TAURI_SIGNING_PRIVATE_KEY != '' }}
        shell: pwsh
        # github.* context is passed via env (never interpolated into the script
        # body) so this can't be a template-injection sink (zizmor).
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $ver = "$env:REF_NAME".TrimStart('v')
          $base = "frontend/src-tauri/target"
          $x64Exe = Get-ChildItem "$base/x86_64-pc-windows-msvc/release/bundle/nsis/Sempa_*_x64-setup.exe" | Select-Object -First 1
          $armExe = Get-ChildItem "$base/aarch64-pc-windows-msvc/release/bundle/nsis/Sempa_*_arm64-setup.exe" | Select-Object -First 1
          $platforms = @{}
          if ($x64Exe -and (Test-Path "$($x64Exe.FullName).sig")) {
            $platforms["windows-x86_64"] = @{ signature = (Get-Content "$($x64Exe.FullName).sig" -Raw); url = "https://github.com/$env:REPO/releases/download/$env:REF_NAME/$($x64Exe.Name)" }
          }
          if ($armExe -and (Test-Path "$($armExe.FullName).sig")) {
            $platforms["windows-aarch64"] = @{ signature = (Get-Content "$($armExe.FullName).sig" -Raw); url = "https://github.com/$env:REPO/releases/download/$env:REF_NAME/$($armExe.Name)" }
          }
          @{ version = $ver; pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ"); platforms = $platforms } |
            ConvertTo-Json -Depth 5 | Out-File -FilePath "latest.json" -Encoding utf8
          Get-Content latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Sempa_*_x64-setup.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Sempa_*_x64_en-US.msi
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/Sempa_*_arm64-setup.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Sempa_*_x64-setup.exe.sig
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/Sempa_*_arm64-setup.exe.sig
            latest.json

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sempa-windows-installers
          path: |
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            frontend/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 14
