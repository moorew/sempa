name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: windows-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Generate Windows icon from PNG
        shell: pwsh
        working-directory: frontend/src-tauri/icons
        run: |
          magick 128x128.png -define icon:auto-resize=256,48,32,16 icon.ico
          Write-Host "icon.ico size: $((Get-Item icon.ico).Length) bytes"

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        working-directory: frontend
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            frontend/src-tauri/target/release/bundle/nsis/sempa_*_x64-setup.exe
            frontend/src-tauri/target/release/bundle/msi/sempa_*_x64_en-US.msi

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: sempa-windows-installers
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 14
