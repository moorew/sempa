version: 2
updates:
  # Go backend
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]
        update-types: [minor, patch]

  # SvelteKit / Tauri / Capacitor frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns: ["*"]
        update-types: [minor, patch]

  # Tauri (Rust) desktop shell
  - package-ecosystem: cargo
    directory: /frontend/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-deps:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      # glib < 0.20 (RUSTSEC-2024-0429) is a transitive, Linux-only dep of Tauri's
      # gtk-rs 0.18 stack (via gio-sys/gdk). Tauri 2.x caps it at 0.18.5, so the
      # 0.20.0 fix is unreachable and the security-update job fails on every run.
      # We don't ship a Linux desktop build, so this code isn't in our artifacts.
      # Revisit when Tauri moves to gtk-rs 0.20. Same applies to the rest of the
      # capped gtk stack.
      - dependency-name: "glib"
      - dependency-name: "gdk"
      - dependency-name: "gdk-sys"
      - dependency-name: "gtk"
      - dependency-name: "gtk-sys"
      - dependency-name: "gio"
      - dependency-name: "gio-sys"
      - dependency-name: "glib-sys"
      - dependency-name: "atk"
      - dependency-name: "pango"

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Base image in the Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
